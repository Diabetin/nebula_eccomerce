<!-- Template para actualizar producto  -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar producto</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Estilos personalizados (fondo, tarjeta, botón holográfico y campos de formulario) -->
    <style>
        body {
            background: radial-gradient(circle at top, #1b1f3b 0, #050814 60%);
            color: #f8f9fa;
            min-height: 100vh;
        }
        .navbar-nebula {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .nebula-card {
            background-color: #111827;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        }
        .nebula-card-header {
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        }

        /* Botón holográfico efecto cristal */
        .nebula-holo-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.5rem;
            border-radius: 999px;
            border: 1px solid rgba(129, 140, 248, 0.8);
            background:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.35), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.35), transparent 50%),
                rgba(15, 23, 42, 0.45);
            color: #e5e7eb;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.03em;
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 25px rgba(59, 130, 246, 0.45),
                0 0 40px rgba(236, 72, 153, 0.35);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }
        .nebula-holo-btn::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -30%;
            width: 60%;
            height: 200%;
            background: linear-gradient(
                120deg,
                rgba(248, 250, 252, 0),
                rgba(248, 250, 252, 0.7),
                rgba(248, 250, 252, 0)
            );
            transform: rotate(20deg);
            opacity: 0;
            transition: all 0.4s ease-out;
        }
        .nebula-holo-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow:
                0 0 30px rgba(59, 130, 246, 0.6),
                0 0 50px rgba(236, 72, 153, 0.45);
            color: #f9fafb;
        }
        .nebula-holo-btn:hover::before {
            top: -20%;
            opacity: 1;
        }

        /* Diseño de campos del formulario (paleta Nebula) */
        form {
            margin-top: 1rem;
        }
        form p {
            margin-bottom: 0.75rem;
        }
        .nebula-card form label {
            font-weight: 500;
            color: #e5e7eb;
        }
        .nebula-card form input[type="text"],
        .nebula-card form input[type="number"],
        .nebula-card form input[type="email"],
        .nebula-card form input[type="password"],
        .nebula-card form textarea,
        .nebula-card form select {
            width: 100%;
            background-color: #020617;
            border: 1px solid rgba(148, 163, 184, 0.7);
            color: #e5e7eb;
            border-radius: 0.5rem;
            padding: 0.45rem 0.75rem;
        }
        .nebula-card form input[type="text"]::placeholder,
        .nebula-card form input[type="number"]::placeholder,
        .nebula-card form textarea::placeholder {
            color: #6b7280;
        }
        .nebula-card form input[type="text"]:focus,
        .nebula-card form input[type="number"]:focus,
        .nebula-card form input[type="email"]:focus,
        .nebula-card form input[type="password"]:focus,
        .nebula-card form textarea:focus,
        .nebula-card form select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.15rem rgba(59, 130, 246, 0.35);
            outline: none;
        }
        .nebula-card form input[type="checkbox"] {
            accent-color: #3b82f6;
        }
    </style>
</head>
<body>
    <!-- Navbar opcional -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-nebula mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'nebula:crud' %}">
                Eccomerce NEBULA
            </a>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="nebula-card p-4">
                    <div class="nebula-card-header mb-3">
                        <h1 class="h4 mb-0">Actualizar producto</h1>
                    </div>

                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        {{ form.as_p }}

                        <button type="submit" class="nebula-holo-btn">
                            Guardar
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS (opcional) -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
