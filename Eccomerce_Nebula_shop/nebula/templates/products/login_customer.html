<!-- template de login de cliente -->
{% extends 'base.html' %}

{% block content %}
    <div class="text-center mb-4">
        <h2>Iniciar Sesión</h2>
        <p>Si no tienes una cuenta, <a href="{% url 'nebula:register_customer' %}">regístrate aquí</a>.</p>
    </div>
    <!-- Formulario centrado en la pagina -->
    <form method="post" class="d-flex flex-column align-items-center">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Iniciar Sesión</button>
{% endblock %}
