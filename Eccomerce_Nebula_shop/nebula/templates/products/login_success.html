{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de sesión exitoso | Eccomerce NEBULA</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Estilos Nebula Shop -->
    <style>
        body {
            background: radial-gradient(circle at top, #1b1f3b 0, #050814 60%);
            color: #f8f9fa;
            min-height: 100vh;
        }
        .navbar-nebula {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .nebula-card {
            background-color: #111827;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        }
        .nebula-card-header {
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        }
        .nebula-badge {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.6);
            color: #bfdbfe;
        }
        .nebula-holo-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.8rem;
            border-radius: 999px;
            border: 1px solid rgba(129, 140, 248, 0.8);
            background:
                radial-gradient(circle at 0% 0%, rgba(59, 130, 246, 0.35), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(236, 72, 153, 0.35), transparent 50%),
                rgba(15, 23, 42, 0.45);
            color: #e5e7eb;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.03em;
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 25px rgba(59, 130, 246, 0.45),
                0 0 40px rgba(236, 72, 153, 0.35);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }
        .nebula-holo-btn::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -30%;
            width: 60%;
            height: 200%;
            background: linear-gradient(
                120deg,
                rgba(248, 250, 252, 0),
                rgba(248, 250, 252, 0.7),
                rgba(248, 250, 252, 0)
            );
            transform: rotate(20deg);
            opacity: 0;
            transition: all 0.4s ease-out;
        }
        .nebula-holo-btn:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow:
                0 0 30px rgba(59, 130, 246, 0.6),
                0 0 50px rgba(236, 72, 153, 0.45);
            color: #f9fafb;
        }
        .nebula-holo-btn:hover::before {
            top: -20%;
            opacity: 1;
        }
    </style>
</head>
<body>
    <!-- Navbar Nebula Shop -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-nebula">
        <div class="container">
            <a class="navbar-brand" href="{% url 'nebula:crud' %}">
                ECCOMERCE NEBULA
            </a>
        </div>
    </nav>

    <!-- Contenido principal -->
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="nebula-card p-4 text-center">
                    <div class="nebula-card-header mb-3">
                        <h1 class="h4 mb-1">Inicio de sesión exitoso</h1>
                        <span class="nebula-badge badge rounded-pill">
                            Bienvenido al panel de administración
                        </span>
                    </div>

                    <p class="mb-3">
                        Bienvenido, <strong>{{ user.username }}</strong>.
                    </p>
                    <p class="mb-4 text-muted">
                        Serás redirigido automáticamente al CRUD de productos en unos segundos.
                    </p>

                    <a href="{% url 'nebula:crud' %}" class="nebula-holo-btn">
                        Ir ahora al CRUD
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPT REDIRECT CON DELAY -->
    <script>
        setTimeout(function() {
            window.location.href = "{% url 'nebula:crud' %}";
        }, 3000); // 3 segundos
    </script>

    <!-- Bootstrap JS + Popper + jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
    ></script>
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    ></script>
</body>
</html>
