<!-- Template para eliminar producto - Nebula Style -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eliminar producto</title>

    <!-- Bootstrap CSS -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Estilos Nebula -->
    <style>
        body {
            background: radial-gradient(circle at top, #1b1f3b 0, #050814 60%);
            color: #f8f9fa;
            min-height: 100vh;
        }
        .navbar-nebula {
            background: linear-gradient(90deg, #3b82f6, #8b5cf6);
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.08em;
        }
        .nebula-card {
            background-color: #111827;
            border-radius: 1rem;
            border: 1px solid rgba(148, 163, 184, 0.4);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.8);
        }
        .nebula-card-header {
            border-bottom: 1px solid rgba(148, 163, 184, 0.3);
        }
        .nebula-holo-btn-danger {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.6rem 1.5rem;
            border-radius: 999px;
            border: 1px solid rgba(248, 113, 113, 0.9);
            background:
                radial-gradient(circle at 0% 0%, rgba(248, 113, 113, 0.35), transparent 50%),
                radial-gradient(circle at 100% 100%, rgba(239, 68, 68, 0.35), transparent 50%),
                rgba(15, 23, 42, 0.6);
            color: #fee2e2;
            text-decoration: none;
            font-weight: 500;
            letter-spacing: 0.03em;
            backdrop-filter: blur(16px);
            box-shadow:
                0 0 25px rgba(248, 113, 113, 0.45),
                0 0 40px rgba(239, 68, 68, 0.35);
            position: relative;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }
        .nebula-holo-btn-danger::before {
            content: "";
            position: absolute;
            top: -100%;
            left: -30%;
            width: 60%;
            height: 200%;
            background: linear-gradient(
                120deg,
                rgba(248, 250, 252, 0),
                rgba(248, 250, 252, 0.6),
                rgba(248, 250, 252, 0)
            );
            transform: rotate(20deg);
            opacity: 0;
            transition: all 0.4s ease-out;
        }
        .nebula-holo-btn-danger:hover {
            transform: translateY(-1px) scale(1.02);
            box-shadow:
                0 0 30px rgba(248, 113, 113, 0.6),
                0 0 50px rgba(239, 68, 68, 0.45);
            color: #fff;
        }
        .nebula-holo-btn-danger:hover::before {
            top: -20%;
            opacity: 1;
        }
        .nebula-link-cancel {
            color: #93c5fd;
            text-decoration: none;
            font-weight: 500;
            margin-left: 1rem;
        }
        .nebula-link-cancel:hover {
            color: #bfdbfe;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <!-- Navbar opcional -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-nebula mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'nebula:crud_categories' %}">
                Eccomerce NEBULA
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'nebula:crud' %}">Inicio Productos</a>
                            {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link text-light-50">{{ user.username }}</span>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'nebula:logout' %}">Cerrar sesión</a>
                </li>
                {% else %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'nebula:login' %}">Iniciar sesión</a>
                </li>
                {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-3">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="nebula-card p-4">
                    <div class="nebula-card-header mb-3">
                        <h1 class="h4 mb-0">Eliminar producto</h1>
                    </div>

                    <p>¿Estás seguro de que quieres eliminar el producto "{{ product.name }}"?</p>

                    <form method="post" class="mt-3">
                        {% csrf_token %}
                        <button type="submit" class="nebula-holo-btn-danger">
                            Sí, eliminar
                        </button>
                        <a href="{% url 'nebula:list_products' %}" class="nebula-link-cancel">
                            Cancelar
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JS (opcional) -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
